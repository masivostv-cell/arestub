<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tube Download - Web App</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome para los íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos personalizados */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; }
        
        /* Tema Ares actualizado */
        .sidebar-gradient { background: linear-gradient(180deg, #1e3a8a 0%, #1e40af 100%); }
        .tab-active { background-color: rgba(255, 255, 255, 0.15); border-left: 4px solid #60a5fa; }
        
        /* Animación de barra de progreso */
        .progress-bar-striped {
            background-image: linear-gradient(45deg, rgba(255,255,255,.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.15) 50%, rgba(255,255,255,.15) 75%, transparent 75%, transparent);
            background-size: 1rem 1rem;
            animation: progress-stripes 1s linear infinite;
        }
        @keyframes progress-stripes {
            from { background-position: 1rem 0; }
            to { background-position: 0 0; }
        }

        /* Ajustes específicos para móviles */
        @media (max-width: 768px) {
            .tab-active { border-left: none; border-top: 4px solid #60a5fa; background-color: rgba(255, 255, 255, 0.1); }
            body { padding: 0; }
            .app-window { border-radius: 0; border: none; height: 100dvh; }
        }

        /* Ocultar barra de desplazamiento para que parezca app nativa */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center sm:p-4 overflow-hidden">

    <!-- Ventana principal de la aplicación -->
    <div class="app-window bg-white w-full max-w-5xl h-full sm:h-[90vh] sm:rounded-xl flex flex-col md:flex-row overflow-hidden shadow-2xl relative">
        
        <!-- Panel lateral (Desktop) / Barra inferior (Móvil) -->
        <div class="sidebar-gradient w-full md:w-64 text-white flex flex-row md:flex-col flex-shrink-0 order-last md:order-first z-20 shadow-lg md:shadow-none">
            
            <!-- Cabecera Logo (Solo visible en Desktop) -->
            <div class="hidden md:flex p-6 items-center gap-3 border-b border-blue-800 shadow-sm bg-black bg-opacity-20">
                <i class="fas fa-cloud-download-alt text-3xl text-blue-300"></i>
                <div>
                    <h1 class="text-xl font-bold tracking-wide">Tube<span class="text-blue-300">Downloader</span></h1>
                    <p class="text-xs text-blue-200 opacity-80">Edición Móvil & Web</p>
                </div>
            </div>
            
            <!-- Navegación -->
            <nav class="flex-1 flex flex-row md:flex-col p-0 md:p-3 w-full">
                <button onclick="switchTab('search')" id="tab-search" class="flex-1 md:w-full text-center md:text-left px-2 md:px-4 py-4 md:py-3 md:rounded md:mb-1 text-xs md:text-sm font-medium transition-colors hover:bg-white hover:bg-opacity-10 tab-active flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-3">
                    <i class="fas fa-search text-xl md:text-base md:w-5 text-center"></i> 
                    <span>Buscar</span>
                </button>
                <button onclick="switchTab('downloads')" id="tab-downloads" class="flex-1 md:w-full text-center md:text-left px-2 md:px-4 py-4 md:py-3 md:rounded md:mb-1 text-xs md:text-sm font-medium transition-colors hover:bg-white hover:bg-opacity-10 flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-3 relative">
                    <i class="fas fa-arrow-down text-xl md:text-base md:w-5 text-center"></i> 
                    <span>Descargas</span>
                    <span id="dl-badge" class="absolute md:relative top-2 md:top-auto right-4 md:right-auto md:ml-auto bg-blue-500 text-white px-1.5 py-0.5 rounded-full text-[10px] md:text-xs font-bold hidden shadow">0</span>
                </button>
            </nav>

            <!-- Estado de conexión (Solo Desktop) -->
            <div class="hidden md:flex p-4 border-t border-blue-800 text-xs items-center gap-2 bg-black bg-opacity-20">
                <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse shadow-[0_0_8px_#4ade80]"></div>
                Sistema conectado a GitHub
            </div>
        </div>

        <!-- Área de contenido principal -->
        <div class="flex-1 flex flex-col bg-gray-50 overflow-hidden relative order-first md:order-last">
            
            <!-- VISTA: BÚSQUEDA -->
            <div id="view-search" class="h-full flex flex-col absolute inset-0 bg-white">
                
                <!-- Barra de búsqueda superior -->
                <div class="bg-white p-3 sm:p-5 border-b border-gray-200 shadow-sm z-10">
                    <div class="flex md:hidden items-center gap-2 mb-3 px-1">
                        <i class="fas fa-cloud-download-alt text-blue-600 text-xl"></i>
                        <h1 class="text-lg font-bold text-gray-800">TubeDownloader</h1>
                    </div>
                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <i class="fas fa-link absolute left-3 top-3.5 text-gray-400"></i>
                            <input type="text" id="searchInput" placeholder="Pega el enlace de YouTube o busca..." class="w-full pl-10 pr-4 py-3 bg-gray-100 border-none rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm md:text-base transition-shadow" onkeypress="if(event.key==='Enter') performSearch()">
                        </div>
                        <button onclick="performSearch()" class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white px-4 md:px-6 py-3 rounded-lg shadow-md transition-colors flex items-center justify-center">
                            <i class="fas fa-search md:mr-2"></i>
                            <span class="hidden md:inline font-medium">Buscar</span>
                        </button>
                    </div>
                </div>

                <!-- Lista de Resultados -->
                <div class="flex-1 overflow-y-auto p-2 sm:p-4 bg-gray-50 pb-24 md:pb-4">
                    
                    <div id="loadingIndicator" class="hidden flex-col items-center justify-center h-48 text-gray-500">
                        <i class="fas fa-circle-notch fa-spin text-4xl mb-3 text-blue-500"></i>
                        <p class="font-medium animate-pulse">Analizando red...</p>
                    </div>

                    <div id="searchResultsList" class="flex flex-col gap-3">
                        <!-- Estado inicial vacío -->
                        <div class="flex flex-col items-center justify-center p-12 text-center text-gray-400 h-64">
                            <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mb-4">
                                <i class="fas fa-satellite-dish text-4xl text-blue-300"></i>
                            </div>
                            <h3 class="text-lg font-semibold text-gray-600 mb-1">Red de Búsqueda Activa</h3>
                            <p class="text-sm max-w-xs">Pega la URL de tu video desde la app de YouTube o escribe el nombre para buscar.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- VISTA: DESCARGAS -->
            <div id="view-downloads" class="h-full flex flex-col absolute inset-0 hidden bg-white">
                <div class="bg-white p-4 border-b border-gray-200 shadow-sm z-10 flex justify-between items-center">
                    <h2 class="text-lg font-bold text-gray-800 flex items-center">
                        <i class="fas fa-list-ul mr-2 text-blue-600"></i> Cola de Descargas
                    </h2>
                    <button onclick="clearCompleted()" class="text-sm text-gray-500 hover:text-red-500 bg-gray-100 px-3 py-1.5 rounded-md transition-colors font-medium">
                        Limpiar
                    </button>
                </div>
                
                <div class="flex-1 overflow-y-auto p-3 sm:p-4 bg-gray-50 pb-24 md:pb-4">
                    <div id="downloadsList" class="flex flex-col gap-3">
                        <!-- Estado inicial vacío -->
                        <div class="flex flex-col items-center justify-center p-12 text-center text-gray-400 h-64" id="emptyDownloadsMsg">
                            <i class="fas fa-box-open text-5xl mb-4 text-gray-300"></i>
                            <p class="text-sm">Tu cola de descargas está vacía.</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Contenedor para Notificaciones Toast -->
    <div id="toast-container" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        // --- ESTADO DE LA APLICACIÓN ---
        let currentDownloads = [];

        // --- SISTEMA DE NOTIFICACIONES (TOAST) ---
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let bgClass = 'bg-gray-800';
            let icon = 'fa-info-circle';
            
            if (type === 'success') { bgClass = 'bg-green-600'; icon = 'fa-check-circle'; }
            else if (type === 'error') { bgClass = 'bg-red-600'; icon = 'fa-exclamation-circle'; }
            
            toast.className = `${bgClass} text-white px-4 py-3 rounded-lg shadow-xl text-sm font-medium flex items-center gap-3 transform transition-all duration-300 translate-y-[-20px] opacity-0 pointer-events-auto max-w-[90vw]`;
            toast.innerHTML = `<i class="fas ${icon} text-lg"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            
            // Animar entrada
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-[-20px]', 'opacity-0');
            });
            
            // Eliminar después de 4 segundos
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-10px]');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // --- NAVEGACIÓN (PESTAÑAS) ---
        function switchTab(tabId) {
            document.getElementById('view-search').classList.add('hidden');
            document.getElementById('view-downloads').classList.add('hidden');
            
            document.getElementById('tab-search').classList.remove('tab-active');
            document.getElementById('tab-downloads').classList.remove('tab-active');
            
            document.getElementById('view-' + tabId).classList.remove('hidden');
            document.getElementById('tab-' + tabId).classList.add('tab-active');
        }

        // --- LÓGICA DE BÚSQUEDA ---
        async function performSearch() {
            let input = document.getElementById('searchInput').value.trim();
            if (!input) return;

            const listContainer = document.getElementById('searchResultsList');
            const loading = document.getElementById('loadingIndicator');
            
            listContainer.innerHTML = '';
            loading.classList.remove('hidden');
            loading.classList.add('flex');

            const ytRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?|shorts)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
            const match = input.match(ytRegex);
            const videoIdDirect = match ? match[1] : null;

            let data = null;

            const instances = [
                'https://pipedapi.kavin.rocks',
                'https://pipedapi.smnz.de',
                'https://de-muc-pipedapi.wuk.sh'
            ];
            
            for (let instance of instances) {
                if (data) break;
                
                let apiUrl = videoIdDirect 
                    ? `${instance}/streams/${videoIdDirect}` 
                    : `${instance}/search?q=${encodeURIComponent(input)}&filter=all`;

                try {
                    const response = await fetch(apiUrl);
                    if (response.ok) {
                        const rawData = await response.json();
                        if (videoIdDirect && rawData.title) {
                            data = {
                                items: [{
                                    type: 'stream',
                                    url: `/watch?v=${videoIdDirect}`,
                                    title: rawData.title,
                                    uploaderName: rawData.uploader,
                                    thumbnail: rawData.thumbnailUrl,
                                    duration: rawData.duration
                                }]
                            };
                        } else {
                            data = rawData;
                        }
                    }
                } catch (e) {
                    console.warn("Fallo búsqueda en " + instance);
                }
            }

            loading.classList.add('hidden');
            loading.classList.remove('flex');

            // Respaldo de emergencia si hay link pero fallan las búsquedas
            if ((!data || !data.items || data.items.length === 0) && videoIdDirect) {
                data = {
                    items: [{
                        type: 'stream',
                        url: `/watch?v=${videoIdDirect}`,
                        title: "Video Detectado (Listo para descargar)",
                        uploaderName: "Enlace Directo",
                        thumbnail: `https://i.ytimg.com/vi/${videoIdDirect}/mqdefault.jpg`,
                        duration: 0
                    }]
                };
            }

            if (!data || !data.items || data.items.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center p-8 text-red-500 bg-red-50 rounded-lg mt-4 border border-red-100">
                        <i class="fas fa-exclamation-triangle text-3xl mb-2"></i>
                        <p class="font-medium mt-2">No se encontraron resultados.</p>
                        <p class="text-sm mt-1 text-red-400">Verifica el enlace o tu conexión a internet.</p>
                    </div>`;
                return;
            }

            const videos = data.items.filter(item => item.type === 'stream');

            videos.forEach((video) => {
                const videoId = video.url.split('v=')[1] || video.url.split('/').pop();
                const title = video.title.replace(/"/g, '&quot;');
                const author = video.uploaderName.replace(/"/g, '&quot;');
                const time = formatTime(video.duration);

                const card = document.createElement('div');
                card.className = 'bg-white border border-gray-200 rounded-xl p-3 shadow-sm hover:shadow-md transition-shadow flex flex-col sm:flex-row gap-3 sm:items-center';
                
                card.innerHTML = `
                    <div class="flex items-start gap-3 flex-1 overflow-hidden">
                        <div class="w-28 h-16 sm:w-32 sm:h-20 bg-gray-200 rounded-lg flex-shrink-0 bg-cover bg-center shadow-inner relative" style="background-image: url('${video.thumbnail}')">
                            ${video.duration > 0 ? `<div class="absolute bottom-1 right-1 bg-black bg-opacity-70 text-white text-[10px] font-bold px-1.5 py-0.5 rounded">${time}</div>` : ''}
                        </div>
                        <div class="flex-1 min-w-0 py-1">
                            <h3 class="font-bold text-gray-800 text-sm sm:text-base leading-tight line-clamp-2" title="${title}">${title}</h3>
                            <p class="text-xs text-gray-500 mt-1 flex items-center gap-1">
                                <i class="fas fa-user-circle"></i> <span class="truncate">${author}</span>
                            </p>
                        </div>
                    </div>
                    <div class="flex gap-2 justify-end border-t sm:border-t-0 border-gray-100 pt-3 sm:pt-0 mt-1 sm:mt-0">
                        <button onclick="startDownload('${videoId}', '${title}', 'audio')" class="flex-1 sm:flex-none bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 px-3 py-2 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-1.5">
                            <i class="fas fa-music"></i> <span class="sm:hidden">Audio</span>
                        </button>
                        <button onclick="startDownload('${videoId}', '${title}', 'video')" class="flex-1 sm:flex-none bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 px-3 py-2 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-1.5">
                            <i class="fas fa-video"></i> <span class="sm:hidden">Video</span>
                        </button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        function formatTime(seconds) {
            if (!seconds || seconds <= 0) return "--:--";
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // --- LÓGICA DE DESCARGAS ---
        function startDownload(videoId, title, type) {
            switchTab('downloads');
            
            const dlId = 'dl_' + Date.now();
            const newDownload = {
                id: dlId,
                videoId: videoId,
                title: title,
                type: type, 
                progress: 0,
                status: 'Procesando archivo...',
                completed: false
            };
            
            currentDownloads.push(newDownload);
            updateDownloadsUI();

            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 20) + 10; 
                
                const dlIndex = currentDownloads.findIndex(d => d.id === dlId);
                if (dlIndex !== -1) {
                    if (progress >= 100) {
                        currentDownloads[dlIndex].progress = 100;
                        currentDownloads[dlIndex].status = 'Listo para guardar';
                        currentDownloads[dlIndex].completed = true;
                        clearInterval(interval);
                        updateDownloadsUI();
                        showToast(`¡Tu archivo está listo para bajar!`, 'success');
                    } else {
                        currentDownloads[dlIndex].progress = progress;
                        currentDownloads[dlIndex].status = `Compilando... ${progress}%`;
                        updateDownloadsUI();
                    }
                } else {
                    clearInterval(interval);
                }
            }, 500);
        }

        function updateDownloadsUI() {
            const container = document.getElementById('downloadsList');
            const msg = document.getElementById('emptyDownloadsMsg');
            const badge = document.getElementById('dl-badge');
            
            const activeCount = currentDownloads.filter(d => !d.completed).length;
            if (activeCount > 0) {
                badge.innerText = activeCount;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            if (currentDownloads.length === 0) {
                msg.style.display = 'flex';
                container.innerHTML = '';
                container.appendChild(msg);
                return;
            }

            msg.style.display = 'none';
            let html = '';

            [...currentDownloads].reverse().forEach(dl => {
                const isAudio = dl.type === 'audio';
                const icon = isAudio ? 'fa-music text-emerald-500' : 'fa-video text-blue-500';
                const format = isAudio ? 'MP3' : 'MP4';
                const isComplete = dl.completed;
                const progressColor = isComplete ? 'bg-green-500' : 'bg-blue-500 progress-bar-striped';
                
                html += `
                    <div class="border border-gray-200 rounded-xl p-3 bg-white flex flex-col sm:flex-row gap-3 shadow-sm">
                        <div class="flex items-center gap-3 flex-1 overflow-hidden">
                            <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center flex-shrink-0 border border-gray-100">
                                <i class="fas ${icon} text-lg"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="font-bold text-gray-800 text-sm truncate" title="${dl.title}">${dl.title}</div>
                                <div class="text-[11px] text-gray-500 font-medium mt-0.5">
                                    ${format} • <span id="status-${dl.id}">${dl.status}</span>
                                </div>
                                <div class="w-full bg-gray-100 rounded-full h-1.5 mt-2 overflow-hidden">
                                    <div class="${progressColor} h-1.5 rounded-full transition-all duration-300" style="width: ${dl.progress}%"></div>
                                </div>
                            </div>
                        </div>
                        <div class="flex sm:flex-col gap-2 mt-2 sm:mt-0 justify-end flex-shrink-0 w-full sm:w-auto border-t sm:border-t-0 border-gray-50 pt-2 sm:pt-0">
                            ${isComplete ? 
                                `<button onclick="executeFinalDownload('${dl.videoId}', '${dl.type}', this)" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold px-4 py-2 rounded-lg w-full sm:w-auto shadow-md flex items-center justify-center gap-2 transition-colors">
                                    <i class="fas fa-download"></i> Guardar
                                </button>` 
                                : 
                                `<button onclick="cancelDownload('${dl.id}')" class="bg-red-50 text-red-600 border border-red-200 text-xs font-bold px-4 py-2 rounded-lg w-full sm:w-auto hover:bg-red-100 transition-colors">
                                    Cancelar
                                </button>`
                            }
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = '';
            container.appendChild(msg);
            container.insertAdjacentHTML('beforeend', html);
        }

        // --- SISTEMA DIRECTO NATIVO (API V7 COBALT CORRECTA) ---
        async function executeFinalDownload(videoId, type, btnElement) {
            const ytUrl = `https://www.youtube.com/watch?v=${videoId}`;
            
            btnElement.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Conectando API...';
            btnElement.disabled = true;
            btnElement.classList.replace('bg-blue-600', 'bg-blue-400');

            // Instancias públicas de Cobalt que SÍ aceptan peticiones desde GitHub Pages
            const instances = [
                'https://api.cobalt.tools',
                'https://co.wuk.sh',
                'https://api.cobalt.acyl.ru',
                'https://cobalt-api.kwiatekit.com'
            ];

            let finalUrl = null;

            for (let instance of instances) {
                if (finalUrl) break;
                
                try {
                    // Petición exacta con el formato de la Versión 7 de la API
                    const res = await fetch(instance, {
                        method: 'POST',
                        headers: {
                            'Accept': 'application/json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            url: ytUrl,
                            videoQuality: "720", 
                            audioFormat: "mp3",  
                            isAudioOnly: type === 'audio',
                            filenamePattern: "classic"
                        })
                    });

                    if (res.ok) {
                        const data = await res.json();
                        // Si la API nos responde con éxito, nos da el enlace directo crudo
                        if (data && data.url) {
                            finalUrl = data.url;
                            break;
                        }
                    }
                } catch(e) {
                    // Si un servidor falla, intenta con el siguiente en milisegundos
                    console.warn("Fallo servidor " + instance);
                }
            }

            if (finalUrl) {
                showToast("¡Archivo extraído! Iniciando descarga nativa...", "success");
                
                // Esto es lo que inicia la descarga en tu navegador sin abrir pestañas.
                // Reemplaza la dirección de la ventana actual con el archivo (que fuerza descarga).
                window.location.href = finalUrl;

                btnElement.innerHTML = '<i class="fas fa-check"></i> Descargado';
                btnElement.classList.replace('bg-blue-400', 'bg-green-600');
                btnElement.disabled = false;
            } else {
                showToast("Todos los servidores públicos están ocupados. Intenta de nuevo.", "error");
                
                // Devuelve el botón a estado "Reintentar" para que el usuario pueda volver a pulsar
                btnElement.innerHTML = '<i class="fas fa-redo"></i> Reintentar';
                btnElement.classList.replace('bg-blue-400', 'bg-red-500');
                btnElement.disabled = false;
            }
        }

        function cancelDownload(id) {
            currentDownloads = currentDownloads.filter(d => d.id !== id);
            updateDownloadsUI();
        }

        function clearCompleted() {
            currentDownloads = currentDownloads.filter(d => !d.completed);
            updateDownloadsUI();
            showToast("Lista limpiada", "info");
        }
    </script>
</body>
</html>
